<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Space Invader </title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Delius&family=Rubik+Doodle+Shadow&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>

<body id="body">

  <div id="startScreen" class="start-screen">
    <div class="start-content">

      <div class="row">
        <h1 class="mx-auto">Doodle Invaders :]</h1>
        <div class="col-4 ">
          <p class="game-menu" onclick="startGame()">Start Game</p>
          <p class="game-menu" onclick="options()">Options</p>
          <p class="game-menu" onclick="showLeaderboard()">Leaderboard</p>
          <p class="game-menu" onclick="stats()">Statistics</p>
        </div>
      </div>


    </div>
  </div>


  </div>


  <div class="container-fluid">
    <div id="titleRow" class="row">
      <div class="col-12 text-center">
        <h1 class="my-4">Doodle Invaders :]</h1>
        <p>Score: <span id="score">0</span> | Health: <span id="health">3</span> | Level <span id="level">1</span></p>
      </div>

    </div>
    <div id="gameRow" class="row">
      <div id="box" class="col-12 d-flex justify-content-center">
        <div style="display:none;">
          <img id="ship" src="img/shipv2.png">
          <img id="invader1" src="img/inavder.png">
          <img id="invader2" src="img/invaderV2.png">
          <img id="invader3" src="img/invaderV3.png">
        </div>
      </div>
    </div>
  </div>

  <div id="deathScreen" class="death-screen">
    <div class="death-content">
      <!-- <h1>RIP Ig</h1> -->
      <p id="finalScore">Final Score: 0</p>
      <button id="restart" type="button" onclick="resetGame()" class="restart-btn">Play Again <i>perchance</i></button>
      <button id="menu" type="button" onclick="menu()" class="menu-btn">Go back to Menu</button>
    </div>
  </div>
  
  <!-- Leaderboard Modal -->
  <div id="leaderboardModal" style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:9999; display:none; justify-content:center; align-items:center;">
    <div style="background:#1a1a2e; padding:20px; border-radius:10px; min-width:300px;">
        <h2 style="color:white;">Leaderboard</h2>
        <div id="leaderboardList" style="color:white;">Loading...</div>
        <button onclick="closeLeaderboard()" style="margin-top:10px; padding:5px 10px;">Close</button>
    </div>
</div>

  <script type="module" src="./js/game.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"></script>
  <script type="module">

  </script>
</body>

</html>
